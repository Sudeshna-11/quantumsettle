<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 260" width="1100" height="260" role="img" aria-label="QuantumSettle — PL/SQL Performance Optimization on Oracle 23ai">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d3b66"/>
      <stop offset="55%" stop-color="#11503f"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="1100" height="260" rx="18" fill="url(#bg)"/>

  <!-- decorative grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="60"  x2="1100" y2="60"/>
    <line x1="0" y1="120" x2="1100" y2="120"/>
    <line x1="0" y1="180" x2="1100" y2="180"/>
    <line x1="0" y1="220" x2="1100" y2="220"/>
  </g>

  <!-- speedup bar chart motif: short → tall, signalling optimisation -->
  <g transform="translate(70,70)" filter="url(#soft)">
    <rect x="0"   y="100" width="28" height="40"  rx="4" fill="url(#bar)" opacity="0.55"/>
    <rect x="40"  y="76"  width="28" height="64"  rx="4" fill="url(#bar)" opacity="0.7"/>
    <rect x="80"  y="42"  width="28" height="98"  rx="4" fill="url(#bar)" opacity="0.85"/>
    <rect x="120" y="14"  width="28" height="126" rx="4" fill="url(#bar)"/>
    <!-- arrow above tallest bar -->
    <path d="M 130 0 L 142 0 L 136 -10 Z" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="260" y="120" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="68" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    QuantumSettle
  </text>

  <!-- Tagline -->
  <text x="262" y="165" font-family="Segoe UI, Helvetica, Arial, sans-serif"
        font-size="22" font-weight="400" fill="#e6f0ec" letter-spacing="1">
    PL/SQL Performance Optimization on Oracle 23ai
  </text>

  <!-- Pills -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="14" font-weight="600">
    <g transform="translate(262,200)">
      <rect width="120" height="28" rx="14" fill="#1b5e20"/>
      <text x="60" y="19" text-anchor="middle" fill="#ffffff">FORALL / BULK</text>
    </g>
    <g transform="translate(394,200)">
      <rect width="156" height="28" rx="14" fill="#0d3b66"/>
      <text x="78" y="19" text-anchor="middle" fill="#ffffff">PARTITION PRUNING</text>
    </g>
    <g transform="translate(562,200)">
      <rect width="172" height="28" rx="14" fill="#5d4037"/>
      <text x="86" y="19" text-anchor="middle" fill="#ffffff">MV / QUERY REWRITE</text>
    </g>
    <g transform="translate(746,200)">
      <rect width="92" height="28" rx="14" fill="#37474f"/>
      <text x="46" y="19" text-anchor="middle" fill="#ffffff">DOCKER</text>
    </g>
    <g transform="translate(850,200)">
      <rect width="56" height="28" rx="14" fill="#455a64"/>
      <text x="28" y="19" text-anchor="middle" fill="#ffffff">CI</text>
    </g>
  </g>
</svg>
