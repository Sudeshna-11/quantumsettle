<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}QuantumSettle{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">

  <style>
    :root {
      --opt-color:       #1b5e20;   /* dark green for the Optimized variant */
      --notopt-color:    #0d3b66;   /* deep blue for the Not Optimized variant */
      --opt-bg:          #d6e9d8;
      --notopt-bg:       #d3dde8;
    }

    body  { background: #f6f7f9; font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    h2    { margin-top: .25rem; }
    .card { box-shadow: 0 1px 3px rgba(0,0,0,.06); border: none; }
    .card-body { padding: 1.25rem 1.5rem; }

    .table-tight th, .table-tight td { padding-top: .35rem; padding-bottom: .35rem; }
    .num   { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: #6c757d; font-size: .85rem; }

    .pill          { font-size: .75rem; padding: .15rem .55rem; border-radius: 999px;
                     background: #e7eef7; color: #2c3e50; display: inline-block; }
    .pill-opt      { background: var(--opt-bg);    color: var(--opt-color);    font-weight: 600; }
    .pill-notopt   { background: var(--notopt-bg); color: var(--notopt-color); font-weight: 600; }
    .pill-good     { background: #d1e7dd; color: #0f5132; }
    .pill-neutral  { background: #fff3cd; color: #664d03; }
    .pill-bad      { background: #f8d7da; color: #842029; }

    /* Phase headers reuse the variant palette */
    .phase-1 { border-left: 4px solid #555; padding-left: .75rem; }
    .phase-2 { border-left: 4px solid var(--opt-color); padding-left: .75rem; }
    .phase-3 { border-left: 4px solid var(--notopt-color); padding-left: .75rem; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="/">QuantumSettle</a>
      <ul class="navbar-nav flex-row gap-3">
        <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/perf">Benchmark</a></li>
        <li class="nav-item"><a class="nav-link" href="/docs">API</a></li>
      </ul>
    </div>
  </nav>

  <main class="container-fluid pb-5">
    {% block content %}{% endblock %}
  </main>

  <footer class="container-fluid text-center muted py-4">
    Oracle 23ai PL/SQL — Ingest, Process and Report — Optimized vs. Not Optimized
  </footer>
</body>
</html>
